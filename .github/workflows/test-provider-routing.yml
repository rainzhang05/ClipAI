name: Test Provider Routing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-provider-catalog:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run ProviderCatalogTests
        run: ./Scripts/test.sh ProviderCatalogTests

  test-provider-registry:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run ProviderRegistryTests
        run: ./Scripts/test.sh ProviderRegistryTests
