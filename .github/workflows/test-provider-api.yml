name: Test Provider API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-anthropic-api:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run AnthropicAPITests
        run: ./Scripts/test.sh AnthropicAPITests

  test-openai-api:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run OpenAICompatibleAPITests
        run: ./Scripts/test.sh OpenAICompatibleAPITests

  test-gemini-api:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run GeminiAPITests
        run: ./Scripts/test.sh GeminiAPITests

  test-provider-http:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run ProviderHTTPTests
        run: ./Scripts/test.sh ProviderHTTPTests
