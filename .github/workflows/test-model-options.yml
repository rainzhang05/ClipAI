name: Test Model Options

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-model-capability-parser:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run ModelCapabilityParserTests
        run: ./Scripts/test.sh ModelCapabilityParserTests

  test-model-capability-fetcher:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run ModelCapabilityFetcherTests
        run: ./Scripts/test.sh ModelCapabilityFetcherTests

  test-model-options-prompt:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run ModelOptionsPromptTests
        run: ./Scripts/test.sh ModelOptionsPromptTests

  test-request-options-api:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run RequestOptionsAPITests
        run: ./Scripts/test.sh RequestOptionsAPITests
