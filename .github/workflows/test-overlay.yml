name: Test Overlay

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-overlay-interaction:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run OverlayInteractionTests
        run: ./Scripts/test.sh OverlayInteractionTests

  test-markdown-rendering:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run MarkdownRenderingTests
        run: ./Scripts/test.sh MarkdownRenderingTests
